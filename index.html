<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Afriza ❤️</title>
    <style>
        :root {
            --primary: #ff4d6d;
            --bg: #0f0f0f;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Smooth Page Transitions */
        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .active { display: flex; opacity: 1; }

        /* Pulsing Start Button */
        .start-btn {
            padding: 20px 50px;
            font-size: 1.5rem;
            background: var(--primary);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 77, 109, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 77, 109, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255, 77, 109, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 77, 109, 0); }
        }

        /* Modern Polaroid */
        .slideshow-container {
            position: relative;
            width: 320px;
            height: 400px;
        }

        .polaroid {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            background: white;
            padding: 15px 15px 40px 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transform: rotate(-2deg);
            transition: all 0.5s ease;
            opacity: 0;
        }

        .polaroid img { width: 100%; height: 300px; object-fit: cover; }

        .polaroid.active-slide { opacity: 1; transform: rotate(0deg) scale(1.05); z-index: 10; }

        /* Navigation */
        .nav-container { margin-top: 50px; display: flex; gap: 15px; }
        
        .nav-btn {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .nav-btn:hover { background: var(--primary); }

        /* Message Area */
        #message {
            max-width: 600px;
            line-height: 1.8;
            font-size: 1.2rem;
            background: var(--glass);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Floating Hearts */
        .heart {
            position: absolute;
            pointer-events: none;
            z-index: -1;
            animation: float Up 6s linear forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="page active" id="page1">
    <h1 style="margin-bottom: 30px;">For my favorite person...</h1>
    <button class="start-btn" onclick="goToPage(2)">Press with Love 💖</button>
</div>

<div class="page" id="page2">
    <div class="slideshow-container">
        <div class="polaroid active-slide" id="s0"><img src="https://raw.githubusercontent.com/wafiqkidal-ui/Dumpling1/a95e509e869fdbc6b35deec6793e817c8beff728/gf1.jpg"></div>
        <div class="polaroid" id="s1"><img src="https://raw.githubusercontent.com/wafiqkidal-ui/Dumpling1/a95e509e869fdbc6b35deec6793e817c8beff728/gf2.jpg"></div>
        <div class="polaroid" id="s2"><img src="https://raw.githubusercontent.com/wafiqkidal-ui/Dumpling1/a95e509e869fdbc6b35deec6793e817c8beff728/gf3.jpg"></div>
        <div class="polaroid" id="s3"><img src="https://raw.githubusercontent.com/wafiqkidal-ui/Dumpling1/41dcfb6bb93d6acee69bdfca628bd2d37e85c2dc/gf4.jpg"></div>
    </div>

    <div class="nav-container">
        <button class="nav-btn" onclick="changeSlide(-1)">❮</button>
        <button class="nav-btn" onclick="changeSlide(1)">❯</button>
        <button class="nav-btn" style="background: var(--primary);" onclick="goToPage(3)">Read my heart</button>
    </div>
</div>

<div class="page" id="page3">
    <div id="message"></div>
    <p style="margin-top: 20px; font-style: italic; opacity: 0.8;">— Yours, Taufiq</p>
</div>

<script>
    function goToPage(n) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        const next = document.getElementById('page' + n);
        next.style.display = 'flex';
        setTimeout(() => next.classList.add('active'), 50);
        if(n === 3) typeMessage();
    }

    let currentSlide = 0;
    const totalSlides = 4;

    function changeSlide(direction) {
        document.getElementById('s' + currentSlide).classList.remove('active-slide');
        currentSlide = (currentSlide + direction + totalSlides) % totalSlides;
        document.getElementById('s' + currentSlide).classList.add('active-slide');
    }

    const messageText = "Hi Afriza, my sayang. Im Taufiq. Sorry for not getting in touch this past week. I wanted to respect your space. I know we have been arguing about the same things until we both got tired but I hope you know how much I love you and how much I want to be with you every day. \n\nHappy National Women's Day to my strong dumpling. 💐 I love you, even if we are not together right now.";

    let charIndex = 0;
    function typeMessage() {
        const el = document.getElementById('message');
        if (charIndex < messageText.length) {
            el.innerHTML += messageText[charIndex] === "\n" ? "<br>" : messageText[charIndex];
            charIndex++;
            setTimeout(typeMessage, 50);
        }
    }

    function createHeart() {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.innerHTML = ['❤️', '💖', '🌸', '✨'][Math.floor(Math.random() * 4)];
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.fontSize = Math.random() * 20 + 10 + 'px';
        heart.style.animationDuration = Math.random() * 3 + 3 + 's';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 6000);
    }
    setInterval(createHeart, 400);
</script>

</body>
</html>
