<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Afriza ❤️ - Multi Page Slideshow</title>
<style>
body {
  margin:0;
  background:#0f0f0f;
  font-family:Arial;
  width:100vw;
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

/* COMMON PAGE */
.page {
  position:absolute;
  width:100vw;
  height:100vh;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* PAGE 1 BUTTON */
#page1 button {
  padding:20px 40px;
  font-size:2rem;
  background:#ff4d6d;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

/* SLIDESHOW */
.polaroid {
  width:80vw;
  max-width:400px;
  height:auto;
  background:#fff;
  border-radius:10px;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
  display:flex;
  justify-content:center;
  align-items:center;
  position:absolute;
  transition:opacity 0.5s ease;
}

.polaroid img {
  width:100%;
  height:auto;
  border-radius:5px;
}

/* NAV BUTTONS */
.nav {
  font-size:3vw;
  cursor:pointer;
  padding:1vw;
  background:rgba(0,0,0,0.3);
  border-radius:50%;
  color:white;
  user-select:none;
  margin-top:20px;
}

/* PAGE 3 MESSAGE */
#message {
  width:90%;
  text-align:center;
  font-size:1.5vw;
  backdrop-filter:blur(5px);
  padding:2vh;
  color:white;
  text-shadow:1px 1px 4px rgba(0,0,0,0.8);
  border-radius:10px;
  max-height:70vh;
  overflow-y:auto;
}

/* HEART */
.heart {
  position:absolute;
  color:#ff4d6d;
  animation:float 6s linear infinite;
}
@keyframes float {
  0% {transform:translateY(100vh) scale(0.5); opacity:1;}
  100% {transform:translateY(-10vh) scale(1.5); opacity:0;}
}
</style>
</head>
<body>

<!-- PAGE 1 -->
<div class="page" id="page1" style="display:flex;">
  <button onclick="goToPage(2)">Sayang 💖</button>
</div>

<!-- PAGE 2 SLIDESHOW -->
<div class="page" id="page2">
  <div class="polaroid" id="polaroid0"><img src="https://raw.githubusercontent.com/wafiqkidal-ui/Dumpling1/a95e509e869fdbc6b35deec6793e817c8beff728/gf1.jpg"></div>
  <div class="polaroid" id="polaroid1"><img src="https://raw.githubusercontent.com/wafiqkidal-ui/Dumpling1/a95e509e869fdbc6b35deec6793e817c8beff728/gf2.jpg"></div>
  <div class="polaroid" id="polaroid2"><img src="https://raw.githubusercontent.com/wafiqkidal-ui/Dumpling1/a95e509e869fdbc6b35deec6793e817c8beff728/gf3.jpg"></div>
  <div class="polaroid" id="polaroid3"><img src="https://raw.githubusercontent.com/wafiqkidal-ui/Dumpling1/41dcfb6bb93d6acee69bdfca628bd2d37e85c2dc/gf4.jpg"></div>

  <div style="display:flex; gap:20px; margin-top:20px;">
    <div class="nav" onclick="prevSlide()">❮ Prev</div>
    <div class="nav" onclick="nextSlide()">Next ❯</div>
    <div class="nav" onclick="goToPage(3)">Go to Message</div>
  </div>
</div>

<!-- PAGE 3 MESSAGE -->
<div class="page" id="page3">
  <div id="message"></div>
</div>

<script>
/* PAGE NAVIGATION */
function goToPage(n){
  document.querySelectorAll('.page').forEach(p => p.style.display='none');
  document.getElementById('page'+n).style.display='flex';
  if(n===3) typeMessage();   // start typewriter on page 3
}

/* SLIDESHOW */
let slideIndex=0;
const totalSlides=4;

function showSlide(i){
  for(let j=0;j<totalSlides;j++){
    const p=document.getElementById('polaroid'+j);
    p.style.opacity=(j===i)? '1':'0';
    p.style.zIndex=(j===i)? '5':'1';
  }
}

function nextSlide(){
  if(slideIndex<totalSlides-1) slideIndex++;
  showSlide(slideIndex);
}

function prevSlide(){
  if(slideIndex>0) slideIndex--;
  showSlide(slideIndex);
}

// initialize slideshow
showSlide(slideIndex);

/* TYPEWRITER MESSAGE */
const messageText="Hi Afriza, my sayang. Im Taufiq. Sorry for not getting in touch this past week. I wanted to respect your space. I know we have been arguing about the same things until we both got tired but I hope you know how much I love you and how much I want to be with you every day. Happy National Women Day to my strong dumpling. 💐 I love you, even if we are not together right now.";

let i=0;
function typeMessage(){
  const el=document.getElementById('message');
  if(i<messageText.length){
    el.innerHTML+=messageText[i];
    i++;
    setTimeout(typeMessage,40);
  }
}

/* HEART PARTICLES */
function createHeart(){
  const heart=document.createElement('div');
  heart.className='heart';
  heart.innerHTML='❤️';
  heart.style.left=Math.random()*100+'vw';
  heart.style.fontSize=Math.random()*30+15+'px';
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),6000);
}
setInterval(createHeart,300);
</script>

</body>
</html>
