<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Afriza ❤️ - Polaroid</title>
<style>
body {
  margin: 0;
  background: #0f0f0f;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* HEART PARTICLES */
.heart {
  position: absolute;
  color: #ff4d6d;
  animation: float 6s linear infinite;
}
@keyframes float {
  0% { transform: translateY(100vh) scale(0.5); opacity: 1; }
  100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
}

/* CONTAINER */
.container {
  width: 360px;
  height: 500px;
  position: relative;
  overflow: hidden;
}

/* POLAROID SLIDER */
.slider {
  display: flex;
  transition: transform 0.6s ease;
}

.polaroid {
  width: 300px;
  height: 400px;
  margin: 0 10px;
  background: #fff;
  border-radius: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-shrink: 0;
  position: relative;
}

.polaroid img {
  width: 90%;
  height: auto;
  border-radius: 5px;
  display: block;
}

/* NAV BUTTONS */
.nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 30px;
  cursor: pointer;
  padding: 10px;
  background: rgba(0,0,0,0.3);
  border-radius: 50%;
  color: white;
  user-select: none;
}

.left { left: 0; }
.right { right: 0; }

/* MESSAGE CARD */
.message {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 14px;
  padding: 10px;
  backdrop-filter: blur(5px);
  max-height: 80px;
  overflow-y: auto;
}
</style>
</head>
<body>

<div class="container">
  <div class="slider" id="slider">
    <div class="polaroid"><img src="https://raw.githubusercontent.com/wafiqkidal-ui/Dumpling1/a95e509e869fdbc6b35deec6793e817c8beff728/gf1.jpg"></div>
    <div class="polaroid"><img src="https://raw.githubusercontent.com/wafiqkidal-ui/Dumpling1/a95e509e869fdbc6b35deec6793e817c8beff728/gf2.jpg"></div>
    <div class="polaroid"><img src="https://raw.githubusercontent.com/wafiqkidal-ui/Dumpling1/a95e509e869fdbc6b35deec6793e817c8beff728/gf3.jpg"></div>
    <div class="polaroid"><img src="https://raw.githubusercontent.com/wafiqkidal-ui/Dumpling1/41dcfb6bb93d6acee69bdfca628bd2d37e85c2dc/gf4.jpg"></div>
  </div>

  <div class="nav left" onclick="prev()">❮</div>
  <div class="nav right" onclick="next()">❯</div>

  <div class="message" id="message"></div>
</div>

<script>
let index = 0;
const slider = document.getElementById("slider");
const total = slider.children.length;

function updateSlider() {
  slider.style.transform = `translateX(-${index*(320)}px)`;
}

function next() {
  if(index < total-1) index++;
  updateSlider();
}

function prev() {
  if(index > 0) index--;
  updateSlider();
}

/* HEART PARTICLES */
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random()*100 + "vw";
  heart.style.fontSize = Math.random()*30 + 15 + "px";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(), 6000);
}
setInterval(createHeart, 300);

/* TYPEWRITER MESSAGE */
const messageText = "Hi Afriza, my sayang. Im Taufiq. Sorry for not getting in touch this past week. I wanted to respect your space. I know we have been arguing about the same things until we both got tired but I hope you know how much I love you and how much I want to be with you every day. Happy National Women Day to my strong dumpling. 💐 I love you, even if we are not together right now.";

let i = 0;
function typeMessage() {
  if(i < messageText.length){
    document.getElementById("message").innerHTML += messageText[i];
    i++;
    setTimeout(typeMessage, 40);
  }
}
typeMessage();
</script>

</body>
</html>
