<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Afriza ❤️</title>

<style>
body {
  margin: 0;
  background: #0f0f0f;
  font-family: Arial, sans-serif;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

/* HEART PARTICLES */
.heart {
  position: absolute;
  color: #ff4d6d;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% {
    transform: translateY(100vh) scale(0.5);
    opacity: 1;
  }
  100% {
    transform: translateY(-10vh) scale(1.5);
    opacity: 0;
  }
}

/* CONTAINER */
.container {
  width: 320px;
  height: 460px;
  position: relative;
  overflow: hidden;
  border-radius: 20px;
  box-shadow: 0 15px 50px rgba(0,0,0,0.6);
  background: #111;
}

/* IMAGE SLIDER */
.slider {
  position: absolute;
  width: 300%;
  height: 100%;
  display: flex;
  transition: transform 0.6s ease;
}

.slide {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* MESSAGE */
.message {
  position: absolute;
  bottom: 20px;
  left: 10px;
  right: 10px;
  background: rgba(0,0,0,0.4);
  padding: 12px;
  border-radius: 10px;
  font-size: 16px;
  backdrop-filter: blur(6px);
}

/* CARD */
.card {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg,#ff4d6d,#ff758f);
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 22px;
  cursor: grab;
  transition: transform 0.6s;
}

.container.open .card {
  transform: translateX(-100%);
}

/* NAV BUTTONS */
.nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 30px;
  cursor: pointer;
  padding: 10px;
  background: rgba(0,0,0,0.3);
  border-radius: 50%;
}

.left {
  left: 10px;
}

.right {
  right: 10px;
}
</style>
</head>

<body>

<div class="container" id="loveCard">

  <div class="slider" id="slider">
    <img src="gf1.jpg" class="slide">
    <img src="gf2.jpg" class="slide">
    <img src="gf3.jpg" class="slide">
  </div>

  <div class="message">
    <span id="text"></span>
  </div>

  <div class="nav left" onclick="prev()">❮</div>
  <div class="nav right" onclick="next()">❯</div>

  <div class="card" id="card">
    Swipe Left ❤️
  </div>

</div>

<script>
/* SWIPE CARD */
let card = document.getElementById("card");
let startX = 0;

card.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

card.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;
  if (startX - endX > 50) {
    document.getElementById("loveCard").classList.add("open");
    startTyping();
  }
});

/* TYPEWRITER MESSAGE */
const message = "Hi Afriza, my sayang. Im Taufiq. Sorry for not getting in touch this past week. I wanted to respect your space. I know we have been arguing about the same things until we both got tired but I hope you know how much I love you and how much I want to be with you every day. Happy National Women Day to my strong dumpling. 💐 I love you, even if we are not together right now.";

let i = 0;

function startTyping() {
  function typing() {
    if (i < message.length) {
      document.getElementById("text").innerHTML += message.charAt(i);
      i++;
      setTimeout(typing, 40);
    }
  }
  typing();
}

/* IMAGE SLIDER */
let index = 0;
const slider = document.getElementById("slider");

function next() {
  index++;
  if (index > 2) index = 0;
  slider.style.transform = "translateX(-" + index*100 + "%)";
}

function prev() {
  index--;
  if (index < 0) index = 2;
  slider.style.transform = "translateX(-" + index*100 + "%)";
}

/* HEART PARTICLES */
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random()*100 + "vw";
  heart.style.fontSize = Math.random()*30 + 15 + "px";
  document.body.appendChild(heart);
  setTimeout(()=>{ heart.remove() }, 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
